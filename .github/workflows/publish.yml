name: Publish

# Triggered by tags like: @voxhq/web-sdk-react@0.1.3
# Or manually via workflow_dispatch

on:
  push:
    tags: ['@voxhq/web-sdk-react@*']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    name: Publish @voxhq/web-sdk-react
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 9.0.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter @voxhq/web-sdk-react build

      - name: Publish to npm
        run: pnpm --filter @voxhq/web-sdk-react publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
